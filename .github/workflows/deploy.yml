#
# Build and deploy the documentation
#
name: Deploy

# Run on main branch only
on:
  # uncomment 'pull_request' line to test the workflow in PR
  # pull_request:
  push:
    branches:
      - main
  schedule:
    # Run weekly at 00:00 on Sunday
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v3.0.0
        with:
          environment-file: environment.yml
          cache-downloads: false
          cache-environment: true

      - uses: actions/cache@v5
        id: cache
        with:
          path: |
            _build/jupyter_execute/
            ~/.local/share/cartopy/
            ~/.matplotlib/
          key: ${{ runner.os }}-${{ hashFiles('environment.yml', 'source/**/*.md', 'source/**/*.yml', 'source/**/*.yaml', 'source/**/*.bib') }}
          restore-keys: ${{ runner.os }}-

      - name: Disable notebook cache for scheduled jobs
        if: github.event_name == 'schedule'
        run: |
          sed -i"" 's/execute_notebooks: auto/execute_notebooks: force/' source/_config.yml

      - name: Build documentation
        run: make dirhtml

      - name: Deploy documentation
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/dirhtml
          # Only keep the latest commit to avoid bloating the repository
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
