# Set update schedule for GitHub Actions

version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions weekly
      interval: "weekly"
      day: "tuesday"
    # Allow up to 5 open pull requests at a time
    open-pull-requests-limit: 5

  - package-ecosystem: "conda"
    directory: "/"
    schedule:
      # Check for updates to the Conda environment weekly
      interval: "weekly"
      day: "tuesday"
    # Allow up to 5 open pull requests at a time
    open-pull-requests-limit: 5
